openapi: 3.1.0
info:
  title: EnergyDataSetItem
  version: 2.0.0
  description: >
    Energy-sector extension of DataSetItem that adds an optional in-message
    dataPayload for inline data delivery. EnergyDataSetItem is a subclass of
    dataset:DataSetItem.

    When dataPayload is present, the consumer can read the data directly from
    the beckn message without fetching an external distribution URL. The payload
    is a self-describing JSON-LD object whose @context resolves to a schema
    hosted on the ies-specs repository (e.g., MeterData, BillingSummary).
paths: {}
components:
  schemas:
    EnergyDataSetItem:
      type: object
      description: >
        Energy-sector extension of DataSetItem that adds an optional in-message
        dataPayload for inline data delivery. EnergyDataSetItem is a subclass
        of dataset:DataSetItem.
      additionalProperties: true
      x-tags:
        - energy
        - dataset
        - inline-data
      x-jsonld:
        "@context": ./context.jsonld
        "@type": EnergyDataSetItem
      properties:
        "@context":
          oneOf:
            - type: string
              format: uri
            - type: array
              items:
                type: string
                format: uri
        "@type":
          type: string
          enum: ["EnergyDataSetItem"]
        "schema:identifier":
          type: string
        "schema:name":
          type: string
        "schema:description":
          type: string
        "schema:temporalCoverage":
          type: string
        "dataset:sensitivityLevel":
          type: string
        "dataset:refreshType":
          type: string
        "dataset:refreshFrequency":
          type: string
        dataPayload:
          description: >
            Optional inline data payload. When present, carries the actual dataset
            content within the beckn message. The @context URI must resolve to a
            valid schema (typically hosted on beckn/ies-specs) that describes the
            payload structure.
          x-jsonld:
            "@id": deg:dataPayload
          type: object
          required:
            - "@context"
            - "@type"
          additionalProperties: true
          properties:
            "@context":
              description: JSON-LD context URI resolving to the payload's schema.
              oneOf:
                - type: string
                  format: uri
                - type: array
                  items:
                    type: string
                    format: uri
            "@type":
              description: The type of data payload (e.g., MeterData, BillingSummary).
              type: string
